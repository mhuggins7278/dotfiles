prSections:
  - title: My Pull Requests
    filters: is:open author:@me
  - title: Work Pending
    filters: is:open review-requested:@me org:glg -review:approved
  - title: Work Involved
    filters: is:open review-requested:@me -author:@me org:glg
  - title: Other Pending
    filters: is:open review-requested:@me -org:glg
  - title: Other Involved
    filters: is:open involves:@me -author:@me -org:glg
issuesSections:
  - title: CSX Board
    filters: is:open project:glg/85
  - title: My Issues
    filters: is:open author:@me
  - title: Assigned
    filters: is:open assignee:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
defaults:
  preview:
    open: true
    grow: true
    width: 0.45
  prsLimit: 20
  issuesLimit: 20
  view: prs
  refetchIntervalMinutes: 15
  layout:
    prs:
      updatedAt:
        width: 7
      repo:
        grow: true
        width: 15
      author:
        width: 15
      reviewStatus:
        width: 15
        hidden: false
      assignees:
        width: 20
        hidden: true
      base:
        width: 15
        hidden: true
      lines:
        width: 16
    issues:
      updatedAt:
        width: 7
      repo:
        width: 15
      creator:
        width: 10
      assignees:
        width: 20
        hidden: true
keybindings:
  issues:
    - key: F
      name: agent fix
      command: >
        ~/.dotfiles/config/gh-dash/agent-fix
        {{.IssueNumber}} '{{.RepoName}}' {{.RepoPath}}
    - key: B
      command: >
        tmux display-popup -d {{.RepoPath}} -w 65 -h 10 -E 'ghprb {{.IssueNumber}}'
    - key: e
      command: >
        tmux new-window -c {{.RepoPath}} 'nvim -c ":silent Octo issue edit {{.IssueNumber}}"'
    - key: i
      command: >
        tmux display-popup -d {{.RepoPath}} -w 80% -h 90% -E 'nvim -c ":silent Octo issue create"'
  prs:
    - key: O
      name: manual review
      command: >
        tmux new-window -c {{.RepoPath}} 'nvim -c ":silent Octo pr edit {{.PrNumber}}"'
    - key: C
      name: agent review
      command: >
        ~/.dotfiles/config/gh-dash/agent-review
        {{.PrNumber}} '{{.RepoName}}' {{.RepoPath}}
repoPaths:
  glg/*: ~/github/glg/*
  Learn-Build-Teach/*: ~/github/mhuggins7278/*
pager:
  diff: "diffnav"
smartFilteringAtLaunch: false
theme:
  ui:
    sectionsShowCount: true
    table:
      compact: false
      showSeparators: true
  colors:
    text:
      primary: "#cdd6f4"
      secondary: "#cba6f7"
      inverted: "#11111b"
      faint: "#bac2de"
      warning: "#f9e2af"
      success: "#a6e3a1"
      error: "#f38ba8"
    background:
      selected: "#313244"
    border:
      primary: "#cba6f7"
      secondary: "#45475a"
      faint: "#313244"
